h2{text-align:center;margin-bottom:20px;color:#333}
.row{margin:14px 0}
label{display:block;margin-bottom:6px;color:#555}
input,select{width:100%;padding:10px 12px;border:1px #ddd solid;border-radius:6px;font-size:16px}
#preview{width:100%;height:120px;border-radius:8px;margin:20px 0;border:1px #eee solid}

<div class="row">
<label>HEX 色碼</label>
<input id="hex" type="text" placeholder="#00bfff" value="#00bfff">
</div>

<div class="row">
<label>RGB</label>
<input id="rgb" type="text" readonly>
</div>

<div class="row">
<label>HSL</label>
<input id="hsl" type="text" readonly>
</div>

<div id="preview"></div>

<div class="info">
HEX：<span id="hexText">#00bfff</span><br>
RGB：<span id="rgbText">rgb(0,191,255)</span><br>
HSL：<span id="hslText">hsl(195,100%,50%)</span>
</div>
</div>

<script>
const hexInput = document.getElementById('hex');
const rgbInput = document.getElementById('rgb');
const hslInput = document.getElementById('hsl');
const preview = document.getElementById('preview');
const hexText = document.getElementById('hexText');
const rgbText = document.getElementById('rgbText');
const hslText = document.getElementById('hslText');
const htmlSelect = document.getElementById('htmlColorSelect');

// HEX轉RGB
function hexToRgb(hex) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// RGB轉HSL
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    let d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

// 更新顏色顯示
function updateColor(hex){
  if(!/^#[0-9A-Fa-f]{6}$/.test(hex))return;
  let rgb=hexToRgb(hex);
  let hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
  preview.style.backgroundColor=hex;
  hexInput.value=hex;
  rgbInput.value=`rgb(${rgb.r},${rgb.g},${rgb.b})`;
  hslInput.value=`hsl(${hsl.h},${hsl.s}%,${hsl.l}%)`;
  hexText.textContent=hex;
  rgbText.textContent=rgbInput.value;
  hslText.textContent=hslInput.value;
}

// 選擇HTML顏色時觸發
htmlSelect.addEventListener('change',()=>{
  let val=htmlSelect.value;
  if(val)updateColor(val);
});

// 手動輸入HEX觸發
hexInput.addEventListener('input',()=>{
  updateColor(hexInput.value);
});

// 初始載入
updateColor('#00bfff');
</script>
</body>
</html>
